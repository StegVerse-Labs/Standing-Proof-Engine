name: Verify Standing Proof

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pressure receipt sample verifier
        run: python spe/verify.py samples/pressure_demo_001.json

      - name: Run stale state sample verifier
        run: python spe/verify.py samples/stale_state_review_commit_001.json

      - name: Run source-bound sample verifier
        run: python spe/verify_source_bound.py samples/source_hash_bound_stale_state_001.json

      - name: Run external source reference verifier
        run: python spe/verify_external_refs.py samples/external_source_ref_stale_state_001.json

      - name: Run frozen hash manifest verifier
        run: python spe/verify_hash_manifest.py samples/hash_manifests/external_source_ref_stale_state_001.hashes.json

      - name: Run expected result fixture verifier
        run: python spe/verify_expected_result.py expected_results/external_source_ref_stale_state_001.expected.json

      - name: Run expected corpus verifier
        run: python spe/verify_expected_corpus.py

      - name: Run pressure receipt JSON export
        run: python spe/verify_json.py samples/pressure_demo_001.json

      - name: Run stale state JSON export
        run: python spe/verify_json.py samples/stale_state_review_commit_001.json

      - name: Run source-bound JSON export
        run: python spe/verify_source_bound.py --json samples/source_hash_bound_stale_state_001.json

      - name: Run external source reference JSON export
        run: python spe/verify_external_refs.py --json samples/external_source_ref_stale_state_001.json

      - name: Generate reviewer reports
        run: |
          python spe/report.py samples/pressure_demo_001.json reports/pressure_demo_001.md default
          python spe/report.py samples/stale_state_review_commit_001.json reports/stale_state_review_commit_001.md default
          python spe/report.py samples/source_hash_bound_stale_state_001.json reports/source_hash_bound_stale_state_001.md source_bound
          python spe/report.py samples/external_source_ref_stale_state_001.json reports/external_source_ref_stale_state_001.md external_refs

      - name: Upload reviewer reports
        uses: actions/upload-artifact@v4
        with:
          name: spe-reviewer-reports
          path: reports/*.md

      - name: Run formalism tests
        run: python -m unittest discover -s tests -p 'test_*.py'
