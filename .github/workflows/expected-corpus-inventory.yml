name: Expected Corpus Inventory

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate expected corpus inventory
        run: |
          mkdir -p reports
          python tools/expected_corpus_inventory.py > reports/expected_corpus_inventory.json || true
          cat reports/expected_corpus_inventory.json

      - name: Write expected corpus failed summaries
        run: |
          python tools/write_expected_corpus_failed_summary.py reports/expected_corpus_inventory.json reports/expected_corpus_failed_fixtures.json reports/expected_corpus_failed_fixtures.md
          cat reports/expected_corpus_failed_fixtures.json
          cat reports/expected_corpus_failed_fixtures.md

      - name: Verify expected corpus inventory SHA-256
        run: |
          python tools/verify_artifact_sha256.py reports/expected_corpus_inventory.json 7d3daf3832ff27521aab38f87368c8505cdf203098b580cea62358add0be5756 > reports/expected_corpus_inventory_sha256.json || true
          cat reports/expected_corpus_inventory_sha256.json

      - name: Upload expected corpus inventory
        uses: actions/upload-artifact@v4
        with:
          name: expected-corpus-inventory
          path: |
            reports/expected_corpus_inventory.json
            reports/expected_corpus_failed_fixtures.json
            reports/expected_corpus_failed_fixtures.md
            reports/expected_corpus_inventory_sha256.json
