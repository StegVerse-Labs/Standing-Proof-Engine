name: SPE TT Binding

on:
  workflow_dispatch:
  push:
    paths:
      - "data/tt/tt_transition_authority_manifest.json"
      - "data/tt/tt_support_transition_authority_manifest.json"
      - "spe/tt_registry.py"
      - "spe/verify_manifest.py"
      - "spe/verify_tt_manifest.py"
      - "spe/check_tt_authority_manifest.py"
      - "spe/check_tt_support_manifest.py"
      - "spe/verify_tt_support_cases.py"
      - "spe/verify_commitment_candidate_receipt_chain.py"
      - "samples/alane_commitment_candidate_manifest.json"
      - "samples/tt_transition_authority_manifest_check.json"
      - "samples/tt_support_transition_cases_manifest.json"
      - "samples/commitment_candidate_receipt_chain_expectation.json"
      - ".github/workflows/spe-tt-binding.yml"

jobs:
  spe-tt-binding:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout SPE
        uses: actions/checkout@v4

      - name: Check TT authority manifest coverage
        run: python spe/check_tt_authority_manifest.py

      - name: Check TT support manifest coverage
        run: python spe/check_tt_support_manifest.py

      - name: Verify runtime support TT cases
        run: python spe/verify_tt_support_cases.py samples/tt_support_transition_cases_manifest.json

      - name: Verify Commitment Candidate receipt chain
        run: python spe/verify_commitment_candidate_receipt_chain.py samples/commitment_candidate_receipt_chain_expectation.json

      - name: Verify TT-bound Commitment Candidate manifest
        run: python spe/verify_tt_manifest.py samples/alane_commitment_candidate_manifest.json

      - name: Verify SPE manifest route
        run: python spe/verify_manifest.py samples/alane_commitment_candidate_manifest.json
